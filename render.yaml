services:
  - type: web
    name: dictation-app-backend
    runtime: python
    rootDir: backend
    buildCommand: apt-get install -y ffmpeg && pip install uv && uv sync --no-dev && rm -f .env
    startCommand: uv run python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WHISPER_MODEL
        value: tiny
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FFPROBE_PATH
        value: ffprobe
      - key: CORS_ORIGINS
        value: '["https://multi-lingual-transcription.vercel.app"]'

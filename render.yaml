services:
  - type: web
    name: dictation-app-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WHISPER_MODEL
        value: tiny
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FFPROBE_PATH
        value: ffprobe
      - key: CORS_ORIGINS
        value: '["https://multi-lingual-transcription.vercel.app","https://multi-lingual-transcription-hemalatha-2005-bvs-projects.vercel.app","https://multi-lingual-transcription-git-main-hemalatha-2005-bvs-projects.vercel.app","http://localhost:5173","http://localhost:3000"]'

services:
  - type: web
    name: dictation-app-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv sync --no-dev
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WHISPER_MODEL
        value: base
      - key: FFMPEG_PATH
        value: ffmpeg
      - key: FFPROBE_PATH
        value: ffprobe
      - key: CORS_ORIGINS
        value: '["https://multi-lingual-transcription.vercel.app"]'

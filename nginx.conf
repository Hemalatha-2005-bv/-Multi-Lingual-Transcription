# Nginx reverse proxy config for the GCE VM
# Place this at /etc/nginx/sites-available/transcription
# then: sudo ln -s /etc/nginx/sites-available/transcription /etc/nginx/sites-enabled/
# and:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_VM_IP_OR_DOMAIN;

    # ── Serve React static files ────────────────────────────────────────────
    root /var/www/transcription/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy REST API to FastAPI ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Large file uploads
        client_max_body_size 512M;
        proxy_read_timeout   600s;
        proxy_send_timeout   600s;
    }

    # ── Proxy WebSocket connections to FastAPI ───────────────────────────────
    location /ws/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;   # Keep WebSocket alive for up to 1 hour
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }
}
